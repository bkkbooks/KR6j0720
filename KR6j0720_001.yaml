body:
  text: 清行策撰首楞嚴一經說在法華之後實為佛法堂奧昔智者判教時此經未來支那故唯以法華涅槃為後味若令一見必廣有疏釋且判屬醍醐無疑矣奈四依大士已滅古今疏主各興異見久如聚訟後學不具擇法眼靡所適從至欲盡廢疏解唯看經文亦過激之論也及乎以己智尋經又多不能達其旨趣則終於昧昧而已試平心論之眾解豈無長處然不失之乖謬即失之粗略閒有智識高超出乎其類者則又借此經發揮匈中刱論有真能舍己從經曲順佛意則西湖鑑一疏之外吾未見其能竝美者孰謂今人必不能邁古耶或病其主張太過譏其杜撰不無縱未能無遺憾要亦大有功於此經者矣至於舍識用根歸重圓通之說則諸佛誠言誰敢不信此方教體誰敢不遵從而議之者皆違經抗佛者也現前諸善友既已標心淨土復欲研究此經甚不易得然始末無論只此圓通文中大有淆譌處若非善讀善會者則所謂醍醐毒藥亦不甚遠豈不聞楞嚴會上選佛場開觀音登科勢至下第修淨土人於此若不揀辨何以發此經之密意而堅後學之行願耶但勢至法門非此經要義故鑑師疏中亦引而不發今則先辨法門次彰密意辨法門者當知此聖圓通屬七大中根大以都攝六根故依此六根而修念佛三昧有三種不同一者念自佛二者念他佛三者念自他佛若念自佛則與諸聖圓通是同以根性為所念法門以旋湛為能念方便如央崛經云所謂彼眼根於諸如來常具足無減修了了分明見乃至彼意根於諸如來常具足無減修了了分明知等亦如此經十方諸佛同告阿難令汝速證安樂解脫寂靜妙常唯汝六根更非他物又如祖師云在胎名身處世為人在眼曰見在耳曰聞在鼻辨香在口談論在手執捉在足運奔識者知是佛性不識喚作精魂從上諸祖如斯指示甚多此念自佛三昧具攝一切教義一切禪宗直指法門罄無不盡也若念他佛則與諸聖圓通有異以六根為能念以果佛為所念法身雖復一體我無二種莊嚴諸佛福智圓滿成兩足尊念彼果德不生疲厭眼常瞻佛相耳常聞佛教鼻常觸佛香舌常稱佛號身常禮佛像意常緣佛法六根所注無非佛境如是相繼無閒無雜此念他佛三昧具攝一切彌陀藥師彌勒上生等經及蓮社一切業行事想法門罄無不盡也若念自他佛則與諸聖圓通同而復異先須開圓頓解了知生佛一如心土不二託彼依正顯我心性既不迷性外有佛亦不執彼土非心此則開圓解處與諸聖同託他境處與諸聖異十六觀經所謂勝異方便今文謂不假方便自得心開以此方便最勝極異故不更假餘方便也祗就圓頓教中三種念佛三昧對四種淨土略辨攝生大用惟念自佛者攝歸實報寂光二種淨土然但能豎入不能橫超又但被利根不能普攝又則諸聖所同不顯此門獨異似非勢至攝歸本旨今謂正攝念他佛及念自他佛二種行人歸于同居淨土兼復橫超方便實報寂光是故文中深明感應道交之益也次顯經密意者選擇圓通法門猶如國家用兵選將相似或推作先鋒或壓令殿後殿後者為正選餘則各隨常隊而已其推與壓要非無故而然祗如十八界中必先根次塵後識此常例也今以六塵居先而根次之六塵中必先色次聲以及香味觸法今以聲最居先而色次之於六根中僅列其五抽出耳根置于二十四門之後葢以此方真教體清淨在音聞故以音塵開先聞根殿後而獨詳明之也雖不顯言其故人已覺之既歸重耳門一經要旨排列圓通法應如是然念佛法門亦逗此方機宜末世眾生須依念佛得度乃此經方令一門深入直了自性若復雙選二門則昧本經旨趣若令念佛法門直爾混依常隊又失他經廣讚之意故今巧示推壓如軍中密令未許泄漏葢前於十八界中明抽耳根為重將矣今乃於七大中暗壓根大為重將而此根大正屬念佛法門既不違他經廣讚之宗仍不乖此經用根之義可謂至巧亦至密矣夫七大次第曰地水火風空見識見即是根本應根先識後今移識居第六而以根大殿後亦如十八界中之耳門也又於前五大中推火大作先鋒而以地水風空次之此有兩意一為當機墮婬起教故以多婬召火警多聞人先除欲漏也故文云說多婬人成猛火聚乃至化多婬心成智慧火諸佛呼我名為火頭我以火光三昧力故成阿羅漢願為力士親伏魔怨等明以警之也一切經律中皆以不殺為首戒此經則以不婬為第一決定明誨於三緣中亦以欲貪先於殺盜均此意耳二為末世對治重障以煩惱雖多惟婬欲為生死根本最能障往生法故令行人觀凡夫身內婬火即如來藏性空真火循業發現深觀得悟成智慧光非唯不障往生且能將送行人託上上品所以淨名讚婬怒癡以其體即藏性而染淨功用在反掌間耳故以火頭居先亦如十八界中之陳那也今請歷觀諸聖除此二先鋒二重將外餘皆一依常例次第不紊可見二十五聖起座之時諸大弟子結集之際一威一儀一起一止皆有深意悉符教義以粗心遇之又安可得耶然則觀音雖獨登科勢至豈全下第但於觀音則明選於勢至則暗選耳良以圓根別入故明選諸相總攝故暗選此方教體故明選此土有緣故暗選通益當機時會現未眾生故明選別益惡世法末時不見佛眾生故暗選虎榜高顯處人所共知朱衣暗點時人所不覺故曰大有淆譌須善讀善會也或曰既是密意何得泄漏曰楞嚴選佛場中揭榜已二千餘年矣此時若不明破密將焉用或又曰誠如子言則文殊說偈選擇時豈亦不知密意何不遵前例一概都揀耶曰諸聖自陳各說第一故寄推壓巧示密機若承敕正選時一依前軌何得成密然但聲塵火大準歸常次以此二門別意助顯非本所歸重故不更推出至於勢至法門仍順長行置識大後為二十四門之殿未始不遵也且既令專選一門何得不揀勢至觀其揀辭仍與諸聖不同但曰因果今殊感云何獲圓通意謂彼雖都攝六根淨念相繼而此相繼之念既屬行蘊遷流亦生滅法以此為因欲往生見佛誰曰不可今欲現證不生滅圓通則因果不符何能克獲此揀現獲圓通為難非揀往生後益也其餘諸聖單念自佛唯屬現修現證故揀則全揀以不逗此土機宜不合此方教體故也有志修證者亦可以深長思矣然此為信力未堅者說若果深信淨土縱令楞嚴獨貶勢至亦自不疑何以故以他經廣讚故曰不可思議功德曰世間難信之法曰一切佛護念曰無上深妙禪曰勝異方便曰三昧中王多處極讚既不生信一處乍貶何輙生疑而況曾不獨貶而況復示暗選乎奈末世眾生讀此經者既不能依教從耳門深入現證圓通偏於念佛法門好起疑惑乃至破他淨信障他善行薄福少智人往往習氣如是故茲約法依經曲為辯析不自知其辭之叢沓也豈得已哉
